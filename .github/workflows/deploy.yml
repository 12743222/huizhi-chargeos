name: 🚀 Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      # ==================== Frontend ====================
      - name: 🏗️ Build Frontend
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
        run: |
          cd hcp-ui
          if [ -f package.json ]; then
            npm install --registry=https://registry.npmmirror.com
            npm run build:prod
            echo "✅ Frontend built"
          else
            echo "ℹ️ No package.json, skipping frontend"
          fi

      # ==================== Backend ====================
      - name: 🏗️ Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: 📦 Build with Maven
        run: mvn clean package -DskipTests -T 4

      - name: 📋 Copy JARs to Docker context
        run: |
          chmod +x scripts/copy-jars.sh
          bash scripts/copy-jars.sh

      # ==================== Package ====================
      - name: 📦 Package deployment archive
        run: |
          tar -czf deploy.tar.gz docker/
          echo "📦 Package size: $(du -h deploy.tar.gz | cut -f1)"

      # ==================== Deploy ====================
      - name: ☁️ Upload to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy.tar.gz"
          target: "/home/hcp/"
          overwrite: true

      - name: 🔄 Deploy on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            # 1. 如果 Docker 没装，用阿里云镜像安装
            if ! command -v docker &> /dev/null; then
              echo "📦 Installing Docker (using Aliyun mirror)..."
              # 阿里云 Docker CE 镜像
              curl -fsSL https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://mirrors.aliyun.com/docker-ce/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
              apt-get update -qq
              apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-compose-plugin
              systemctl start docker
              systemctl enable docker
              echo "✅ Docker installed: $(docker --version)"
            else
              echo "✅ Docker installed: $(docker --version)"
            fi

            # 2. 配置阿里云镜像加速（可选，加速拉取）
            mkdir -p /etc/docker
            cat > /etc/docker/daemon.json <<EOF
            {
              "registry-mirrors": ["https://registry.cn-hangzhou.aliyuncs.com"]
            }
            EOF
            systemctl daemon-reload 2>/dev/null || true
            systemctl restart docker 2>/dev/null || true

            # 3. 解压
            echo "📂 Extracting..."
            mkdir -p /home/hcp/docker
            cd /home/hcp/docker
            tar -xzf /home/hcp/deploy.tar.gz --strip-components=1
            rm -f /home/hcp/deploy.tar.gz

            # 4. 构建镜像
            echo "🏗️ Building Docker images..."
            docker compose build --parallel

            # 5. 启动服务
            echo "🚀 Restarting services..."
            docker compose up -d --remove-orphans

            echo ""
            echo "✅ Deploy complete!"
            echo ""
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
